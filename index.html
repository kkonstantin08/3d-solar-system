<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solar System Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700&display=swap");

      body {
        font-family: "Exo 2", sans-serif;
        overflow: hidden;
        background: #000;
      }

      #canvas-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }

      .glass-panel {
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(148, 163, 184, 0.2);
      }

      .planet-selector:hover {
        transform: scale(1.1);
        box-shadow: 0 0 20px currentColor;
      }

      .orbit-trail {
        stroke-dasharray: 5, 5;
        opacity: 0.3;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .pulse-glow {
        animation: pulse 2s infinite;
      }

      .star-field {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }

      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s;
      }

      .hud-line {
        background: linear-gradient(
          90deg,
          transparent,
          rgba(56, 189, 248, 0.5),
          transparent
        );
        height: 1px;
      }

      .slider-track {
        background: linear-gradient(
          90deg,
          rgba(56, 189, 248, 0.3),
          rgba(168, 85, 247, 0.3)
        );
      }

      .planet-card-transition {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body class="text-white antialiased">
    <!-- Loading Screen -->
    <div id="loading" class="loading-overlay">
      <div class="text-center">
        <div
          class="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4 mx-auto"
        ></div>
        <p class="text-blue-400 text-lg tracking-wider">
          Initializing Solar System...
        </p>
      </div>
    </div>

    <!-- 3D Canvas -->
    <div id="canvas-container"></div>

    <!-- UI Overlay -->
    <div
      class="relative z-10 pointer-events-none h-screen flex flex-col justify-between p-4 md:p-6"
    >
      <!-- Header -->
      <header class="flex justify-between items-start pointer-events-auto gap-4">
        <div class="glass-panel rounded-2xl p-4 md:px-5 md:py-4 max-w-md">
          <div class="flex flex-wrap items-center gap-3 text-xs text-slate-400 md:text-sm">
            <span class="flex items-center gap-1.5">
              <i data-lucide="mouse-pointer-click" class="w-3.5 h-3.5 text-blue-400"></i>
              Click planet: track
            </span>
            <span class="flex items-center gap-1.5">
              <i data-lucide="mouse" class="w-3.5 h-3.5 text-slate-300"></i>
              Drag: rotate
            </span>
            <span class="flex items-center gap-1.5">
              <i data-lucide="move" class="w-3.5 h-3.5 text-slate-300"></i>
              Right click: pan
            </span>
            <span class="flex items-center gap-1.5">
              <i data-lucide="zoom-in" class="w-3.5 h-3.5 text-slate-300"></i>
              Scroll: zoom
            </span>
          </div>
        </div>

        <!-- Time Controls -->
        <div class="glass-panel rounded-2xl p-4 flex flex-col gap-3">
          <div class="flex items-center gap-2 text-sm text-slate-400 mb-1">
            <i data-lucide="clock" class="w-4 h-4"></i>
            <span>Time Control</span>
          </div>
          <div class="flex items-center gap-2">
            <button
              id="playPause"
              class="p-2 rounded-lg bg-blue-500/20 hover:bg-blue-500/40 border border-blue-500/50 transition-all"
            >
              <i
                data-lucide="pause"
                class="w-5 h-5 text-blue-400"
                id="playIcon"
              ></i>
            </button>
            <button
              id="resetView"
              class="p-2 rounded-lg bg-purple-500/20 hover:bg-purple-500/40 border border-purple-500/50 transition-all"
            >
              <i data-lucide="refresh-cw" class="w-5 h-5 text-purple-400"></i>
            </button>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-xs text-slate-500">Pause</span>
            <input
              type="range"
              id="speedSlider"
              min="0"
              max="5"
              step="0.1"
              value="1"
              class="w-24 h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer slider-track"
            />
            <span class="text-xs text-slate-500">Fast</span>
          </div>
          <div class="text-[11px] text-slate-400 space-y-1">
            <div class="flex items-center justify-between gap-3">
              <span>Sim Date</span>
              <span id="simDateValue" class="font-mono text-slate-200"></span>
            </div>
            <div class="flex items-center justify-between gap-3">
              <span>Rate</span>
              <span id="speedValue" class="font-mono text-slate-200"></span>
            </div>
          </div>
        </div>
      </header>

      <!-- Bottom Section -->
      <div
        class="flex flex-col md:flex-row justify-between items-end gap-4 pointer-events-auto"
      >
        <!-- Planet Info Panel (Hidden by default) -->
        <div
          id="planetInfo"
          class="glass-panel rounded-2xl p-6 max-w-sm transform translate-y-full opacity-0 planet-card-transition hidden absolute bottom-4 right-4 md:right-6"
        >
          <button
            id="closePlanetInfo"
            class="absolute top-3 right-3 text-slate-400 hover:text-white transition-colors"
          >
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
          <div class="flex items-center gap-4 mb-4">
            <div
              id="planetColorIndicator"
              class="w-16 h-16 rounded-full shadow-lg"
            ></div>
            <div>
              <h2 id="planetName" class="text-2xl font-bold text-white"></h2>
              <p id="planetType" class="text-blue-400 text-sm"></p>
            </div>
          </div>
          <div class="space-y-3 text-sm">
            <div class="flex justify-between py-2 border-b border-slate-700">
              <span class="text-slate-400">Distance from Sun</span>
              <span id="planetDistance" class="text-white font-mono"></span>
            </div>
            <div class="flex justify-between py-2 border-b border-slate-700">
              <span class="text-slate-400">Orbital Period</span>
              <span id="planetPeriod" class="text-white font-mono"></span>
            </div>
            <div class="flex justify-between py-2 border-b border-slate-700">
              <span class="text-slate-400">Radius</span>
              <span id="planetRadius" class="text-white font-mono"></span>
            </div>
            <div class="flex justify-between py-2 border-b border-slate-700">
              <span class="text-slate-400">Temperature</span>
              <span id="planetTemp" class="text-white font-mono"></span>
            </div>
            <div class="flex justify-between py-2">
              <span class="text-slate-400">Moons</span>
              <span id="planetMoons" class="text-white font-mono"></span>
            </div>
            <div class="flex justify-between py-2 border-t border-slate-700">
              <span class="text-slate-400">Semi-major axis</span>
              <span id="planetSemiMajorAxis" class="text-white font-mono"></span>
            </div>
            <div class="flex justify-between py-2 border-b border-slate-700">
              <span class="text-slate-400">Eccentricity</span>
              <span id="planetEccentricity" class="text-white font-mono"></span>
            </div>
            <div class="flex justify-between py-2">
              <span class="text-slate-400">Inclination</span>
              <span id="planetInclination" class="text-white font-mono"></span>
            </div>
          </div>
          <button
            id="stopTracking"
            class="mt-4 w-full py-2 rounded-lg bg-gradient-to-r from-red-500 to-orange-500 hover:from-red-600 hover:to-orange-600 transition-all text-sm font-semibold hidden"
          >
            Stop Tracking
          </button>
        </div>

        <!-- Left Side Planet Selector -->
        <div
          class="fixed left-4 md:left-6 top-[56%] -translate-y-1/2 glass-panel rounded-2xl p-3 pointer-events-auto"
        >
          <p
            class="text-xs text-slate-400 mb-3 text-center uppercase tracking-wider"
          >
            Planets
          </p>
          <div class="grid grid-cols-2 gap-2">
            <button
              class="planet-btn p-2 rounded-lg hover:bg-slate-700/50 transition-all group"
              data-planet="sun"
            >
              <div
                class="w-8 h-8 rounded-full bg-yellow-400 shadow-lg shadow-yellow-400/50 planet-selector transition-all"
              ></div>
              <span
                class="text-xs text-slate-400 mt-1 block text-center opacity-0 group-hover:opacity-100 transition-opacity"
                >Sun</span
              >
            </button>
            <button
              class="planet-btn p-2 rounded-lg hover:bg-slate-700/50 transition-all group"
              data-planet="mercury"
            >
              <div
                class="w-6 h-6 rounded-full bg-gray-400 shadow-lg planet-selector transition-all"
              ></div>
              <span
                class="text-xs text-slate-400 mt-1 block text-center opacity-0 group-hover:opacity-100 transition-opacity"
                >Mercury</span
              >
            </button>
            <button
              class="planet-btn p-2 rounded-lg hover:bg-slate-700/50 transition-all group"
              data-planet="venus"
            >
              <div
                class="w-7 h-7 rounded-full bg-orange-300 shadow-lg planet-selector transition-all"
              ></div>
              <span
                class="text-xs text-slate-400 mt-1 block text-center opacity-0 group-hover:opacity-100 transition-opacity"
                >Venus</span
              >
            </button>
            <button
              class="planet-btn p-2 rounded-lg hover:bg-slate-700/50 transition-all group"
              data-planet="earth"
            >
              <div
                class="w-7 h-7 rounded-full bg-blue-500 shadow-lg shadow-blue-500/50 planet-selector transition-all"
              ></div>
              <span
                class="text-xs text-slate-400 mt-1 block text-center opacity-0 group-hover:opacity-100 transition-opacity"
                >Earth</span
              >
            </button>
            <button
              class="planet-btn p-2 rounded-lg hover:bg-slate-700/50 transition-all group"
              data-planet="mars"
            >
              <div
                class="w-6 h-6 rounded-full bg-red-500 shadow-lg shadow-red-500/50 planet-selector transition-all"
              ></div>
              <span
                class="text-xs text-slate-400 mt-1 block text-center opacity-0 group-hover:opacity-100 transition-opacity"
                >Mars</span
              >
            </button>
            <button
              class="planet-btn p-2 rounded-lg hover:bg-slate-700/50 transition-all group"
              data-planet="jupiter"
            >
              <div
                class="w-10 h-10 rounded-full bg-orange-200 shadow-lg planet-selector transition-all"
              ></div>
              <span
                class="text-xs text-slate-400 mt-1 block text-center opacity-0 group-hover:opacity-100 transition-opacity"
                >Jupiter</span
              >
            </button>
            <button
              class="planet-btn p-2 rounded-lg hover:bg-slate-700/50 transition-all group"
              data-planet="saturn"
            >
              <div
                class="w-9 h-9 rounded-full bg-yellow-200 shadow-lg planet-selector transition-all relative"
              >
                <div
                  class="absolute inset-0 border-2 border-yellow-100/30 rounded-full transform scale-150"
                ></div>
              </div>
              <span
                class="text-xs text-slate-400 mt-1 block text-center opacity-0 group-hover:opacity-100 transition-opacity"
                >Saturn</span
              >
            </button>
            <button
              class="planet-btn p-2 rounded-lg hover:bg-slate-700/50 transition-all group"
              data-planet="uranus"
            >
              <div
                class="w-8 h-8 rounded-full bg-cyan-300 shadow-lg planet-selector transition-all"
              ></div>
              <span
                class="text-xs text-slate-400 mt-1 block text-center opacity-0 group-hover:opacity-100 transition-opacity"
                >Uranus</span
              >
            </button>
            <button
              class="planet-btn p-2 rounded-lg hover:bg-slate-700/50 transition-all group"
              data-planet="neptune"
            >
              <div
                class="w-8 h-8 rounded-full bg-blue-700 shadow-lg planet-selector transition-all"
              ></div>
              <span
                class="text-xs text-slate-400 mt-1 block text-center opacity-0 group-hover:opacity-100 transition-opacity"
                >Neptune</span
              >
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="scripts.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
